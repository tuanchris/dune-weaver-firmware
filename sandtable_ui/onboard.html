<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a1712"><title>Dune Weaver · Setup</title>
<style>
:root{--bg:#1a1712;--card:#241f18;--line:#3a3225;--ink:#f3ead6;--dim:#a99c82;--gold:#d8a657;--gold2:#e8c07d}
*{box-sizing:border-box}
body{margin:0;font:16px/1.5 ui-rounded,"SF Pro Rounded",system-ui,Segoe UI,Roboto,sans-serif;
background:radial-gradient(120% 80% at 50% -10%,#2a2418 0%,var(--bg) 60%);color:var(--ink);
min-height:100dvh;-webkit-font-smoothing:antialiased}
.wrap{max-width:440px;margin:0 auto;padding:32px 20px 56px}
header{text-align:center;margin:24px 0 28px}
.mark{width:60px;height:60px;margin:0 auto 14px;display:block}
h1{font-size:24px;margin:0;letter-spacing:.3px}
.sub{color:var(--dim);font-size:14px;margin-top:6px}
.card{background:linear-gradient(180deg,#28221a,#211c15);border:1px solid var(--line);
border-radius:18px;padding:20px;margin:16px 0;box-shadow:0 10px 30px -18px #000}
.card h2{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:0 0 14px;font-weight:700}
label{display:block;font-size:13px;color:var(--dim);margin:12px 0 6px}
select,input{width:100%;background:#1b1710;border:1px solid var(--line);color:var(--ink);
border-radius:11px;padding:12px 13px;font-size:15px;outline:none}
select:focus,input:focus{border-color:var(--gold)}
.row{display:flex;gap:10px;align-items:flex-end}
.row select{flex:1}
button{font:inherit;font-weight:600;cursor:pointer;border-radius:11px;border:1px solid transparent;padding:12px 16px}
.scan{background:#2f2718;border-color:var(--line);color:var(--gold2);width:46px;flex:none;font-size:18px}
.go{width:100%;margin-top:18px;background:linear-gradient(180deg,var(--gold2),var(--gold));color:#251a08;border:none;font-size:16px}
.go:active{transform:translateY(1px)}
.stat{font-size:13px;color:var(--dim);margin-top:12px;min-height:18px;text-align:center}
.stores{display:flex;flex-direction:column;gap:10px}
.store{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--ink);
background:#1b1710;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.store b{font-size:15px}.store span{display:block;font-size:12px;color:var(--dim)}
.store .ic{width:26px;height:26px;flex:none;color:var(--gold2)}
.note{font-size:12.5px;color:var(--dim);text-align:center;margin-top:18px;line-height:1.6}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
background:#0f0d09;border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:999px;
font-size:14px;transition:.25s;pointer-events:none;max-width:90vw}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head><body>
<div class="wrap">
<header>
<svg class="mark" viewBox="0 0 100 100" fill="none" stroke="#d8a657" stroke-width="2.2">
<circle cx="50" cy="50" r="44"/><path d="M50 50 m-34 0 a34 30 0 1 0 68 0 a30 26 0 1 1 -60 0 a26 22 0 1 0 52 0 a22 18 0 1 1 -44 0 a18 14 0 1 0 36 0 a14 10 0 1 1 -28 0"/>
</svg>
<h1>Dune Weaver</h1>
<div class="sub">Let's get your table online.</div>
</header>

<div class="card">
<h2>Connect to Wi-Fi</h2>
<div class="row">
<div style="flex:1"><label>Network</label>
<select id="list"><option value="">— scan for networks —</option></select></div>
<button class="scan" id="scan" onclick="scan()" title="Scan">⟳</button>
</div>
<label>Network name</label><input id="ssid" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Wi-Fi name">
<label>Password</label><input id="pw" type="password" placeholder="Wi-Fi password">
<button class="go" onclick="save()">Save &amp; connect</button>
<div class="stat" id="stat"></div>
</div>

<div class="card">
<h2>Get the app</h2>
<div class="stores">
<a class="store" id="ios" href="#"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="6.5" y="2.5" width="11" height="19" rx="2.5"/><path d="M10.5 5.5h3"/></svg><div><b>iOS &amp; iPadOS</b><span>App Store</span></div></a>
<a class="store" id="android" href="#"><svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4.5v15c0 .5.5.8.9.5l11-7.5c.4-.3.4-.9 0-1.1l-11-7.5c-.4-.3-.9 0-.9.6z"/></svg><div><b>Android</b><span>Google Play</span></div></a>
<a class="store" id="mac" href="#"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="12" rx="1.5"/><path d="M8 21h8M12 17v4"/></svg><div><b>macOS</b><span>Desktop app</span></div></a>
</div>
</div>

<div class="note">After connecting, the table reboots and joins your network.<br>Reconnect this device to your home Wi-Fi, then open the app — it finds the table automatically.</div>
</div>
<div class="toast" id="toast"></div>
<script>
const $=i=>document.getElementById(i);
const cmd=async c=>{try{const r=await fetch('/command?plain='+encodeURIComponent(c),{cache:'no-store'});return await r.text();}catch(e){return'';}};
let tT;function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('on'),2600);}
async function scan(){
  $('scan').disabled=true;$('stat').textContent='Scanning…';
  let t=await cmd('[ESP410]'),aps=[];
  try{const m=t.match(/\{[\s\S]*"AP_LIST"[\s\S]*\}/);if(m)aps=JSON.parse(m[0]).AP_LIST||[];}catch(e){}
  const sel=$('list'),seen=new Set();sel.innerHTML='<option value="">— pick a network —</option>';
  aps.sort((a,b)=>(parseInt(b.SIGNAL)||0)-(parseInt(a.SIGNAL)||0));
  aps.forEach(a=>{const n=a.SSID;if(!n||seen.has(n))return;seen.add(n);
    const o=document.createElement('option');o.value=n;o.textContent=n+'  ('+(a.SIGNAL||'?')+'%'+(a.IS_PROTECTED==0?' · open':'')+')';sel.appendChild(o);});
  sel.onchange=()=>{if(sel.value)$('ssid').value=sel.value;};
  $('scan').disabled=false;$('stat').textContent='';toast(seen.size+' networks found');
}
async function save(){
  const ssid=$('ssid').value.trim(),pw=$('pw').value;
  if(!ssid){toast('Pick or enter a network');return;}
  if(!confirm('Connect the table to “'+ssid+'”?  It will reboot.'))return;
  await cmd('$Sta/SSID='+ssid);
  if(pw)await cmd('$Sta/Password='+pw);
  await cmd('$WiFi/Mode=STA>AP');
  $('stat').textContent='Saved — rebooting to join “'+ssid+'”…';
  toast('Connecting…');cmd('$Bye');
}
async function status(){
  const g=async k=>{const t=await cmd('$'+k);const m=t.match(new RegExp(k.replace(/\//g,'\\/')+'=(.+)'));return m?m[1].trim():null;};
  const ss=await g('Sta/SSID'),md=await g('WiFi/Mode');
  $('stat').textContent=ss?('Saved network: “'+ss+'”'+(md?' · '+md:'')):'';
  if(ss&&!$('ssid').value)$('ssid').value=ss;
}
status();
</script></body></html>
