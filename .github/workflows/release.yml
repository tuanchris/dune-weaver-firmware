name: Release

# Cut a Dune Weaver Firmware release when a `v*` tag is pushed. Mirrors the
# local flow in RELEASING.md: build the `sandtable` firmware + littlefs image
# via build-dw-release.py (flat .bin images + manifest.json + a convenience
# zip), then publish them as GitHub Release assets. Runs on ubuntu, whose
# bundled x86_64 mklittlefs works (the arm64 mklittlefs swap is a Mac-only note).
#
# Cut a release with:
#   git tag -a v0.1.11 -m "Dune Weaver Firmware v0.1.11"
#   git push origin v0.1.11
# or trigger manually against an existing tag via the Actions tab.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # build-dw-release.py reads the version from `git describe`
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-sandtable-${{ runner.os }}
      - name: Build release artifacts
        run: python3 build-dw-release.py
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Match the dir build-dw-release.py staged (named from `git describe`),
          # so a tag push and a manual dispatch on the same tag both resolve here.
          TAG="$(git describe --tags --abbrev=0)"
          # Release notes come from the annotated tag's BODY (everything after
          # the subject line) -- write the changelog into `git tag -a` per
          # RELEASING.md. `--generate-notes` only summarizes merged PRs, which
          # is empty for direct-to-main commits (the bare "Full Changelog" link
          # bug), so we only fall back to it when the tag has no body.
          NOTES="$(git for-each-ref "refs/tags/$TAG" --format='%(contents:body)')"
          if [ -n "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            printf '%s\n' "$NOTES" > "$RUNNER_TEMP/relnotes.md"
            gh release create "$TAG" --title "$TAG" \
              --notes-file "$RUNNER_TEMP/relnotes.md" \
              "release/$TAG"/*
          else
            gh release create "$TAG" --title "$TAG" \
              --generate-notes \
              "release/$TAG"/*
          fi
      - name: Track artifacts on the default branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The installer downloads the firmware binaries from releases/<tag>/ on
          # the default branch (raw.githubusercontent.com/.../<branch>/...), NOT
          # from the GitHub Release assets, so every release must also commit its
          # artifacts there or the installer 404s ("Could not download the release
          # asset"). release/<tag>/ is gitignored + untracked, so it survives the
          # branch checkout; we copy it into the tracked releases/<tag>/.
          TAG="$(git describe --tags --abbrev=0)"
          BRANCH="${{ github.event.repository.default_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git checkout -B "$BRANCH" "origin/$BRANCH"
          mkdir -p "releases/$TAG"
          cp -f "release/$TAG"/* "releases/$TAG"/
          git add "releases/$TAG"
          if git diff --cached --quiet; then
            echo "artifacts already tracked; nothing to commit"
          else
            git commit -m "Track $TAG release artifacts"
            # one retry in case the branch advanced between fetch and push
            git push origin "HEAD:$BRANCH" || { git pull --rebase origin "$BRANCH" && git push origin "HEAD:$BRANCH"; }
          fi
