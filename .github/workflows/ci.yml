name: CI

# Dune Weaver Firmware ships a single target: the `sandtable` PlatformIO env
# (MKS-DLC32 / ESP32, 4M). This CI does the two things that matter for the fork:
#   1. run the native unit tests (ASan/UBSan) — the fast gate on every change
#   2. build the sandtable firmware — so a broken shipping target fails CI
# (Upstream FluidNC's noradio/wifi/bt build matrix and Windows portability legs
# were dropped: the fork builds none of those targets and is developed on macOS.)

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-tests-${{ runner.os }}
      - name: Run native tests
        run: pio test -e tests -vv

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-sandtable-${{ runner.os }}
      - name: Build sandtable firmware
        run: pio run -e sandtable
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandtable-firmware
          path: |
            .pio/build/sandtable/firmware.bin
            .pio/build/sandtable/partitions.bin
            .pio/build/sandtable/bootloader.bin
